paths:
  /api/user/register:
    post:
      tags: [user]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, deviceId]
              properties:
                username:
                  type: string
                password:
                  type: string
                deviceId:
                  type: string
      responses:
        '200':
          description: register result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/user/login:
    post:
      tags: [user]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, deviceId]
              properties:
                username:
                  type: string
                password:
                  type: string
                deviceId:
                  type: string
      responses:
        '200':
          description: login result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/user/add_fcm_token:

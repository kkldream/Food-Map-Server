              properties:
                userId:
                  type: string
                accessKey:
                  type: string
                deviceId:
                  type: string
                fcmToken:
                  type: string
      responses:
        '200':
          description: add FCM token result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
